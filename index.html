.stat .v { font-size: 18px; font-weight: 800; margin-top: 4px; display: flex; align-items: center; gap: 7px; }

.weekbars { display: flex; align-items: stretch; gap: 8px; height: 150px; margin: 10px 0 4px; }
.wbcol { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 6px; }
.wbemoji { font-size: 18px; line-height: 1; }
.wbbar { width: 72%; max-width: 34px; border-radius: 10px 10px 4px 4px; transition: height .6s cubic-bezier(.3,1,.4,1); }
.wblbl { font-size: 11px; font-weight: 700; opacity: .6; text-transform: lowercase; }

.heathead { display: grid; grid-template-columns: repeat(7,1fr); gap: 6px; margin-bottom: 6px; }
.heathead span { text-align: center; font-size: 10px; font-weight: 700; opacity: .45; }
.heat { display: grid; grid-template-columns: repeat(7,1fr); gap: 6px; }
.hc { aspect-ratio: 1; border-radius: 9px; display: flex; align-items: flex-start; justify-content: flex-end; padding: 3px 5px; font-family: 'Space Mono', monospace; font-size: 10px; }
.hc.blank { background: transparent; }
.hc.none { background: rgba(255,255,255,.06); color: rgba(255,255,255,.4); }
.hc.today { box-shadow: 0 0 0 2px var(--accent); }

.tips { display: flex; flex-direction: column; gap: 12px; margin-top: 8px; }
.tip { display: flex; gap: 12px; align-items: flex-start; padding: 14px 16px; border-radius: 16px; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); }
.tip .ti { flex: 0 0 auto; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; background: linear-gradient(135deg, var(--g1), var(--accent)); }
.tip .tt { font-size: 14.5px; line-height: 1.45; font-weight: 600; }
.recaptext { font-size: 15.5px; line-height: 1.55; margin: 6px 0 4px; }

.parentbox { background: rgba(255,255,255,.05); border: 1px dashed rgba(255,255,255,.25); border-radius: 18px; padding: 16px; margin-top: 6px; }
.parentnote { font-size: 14.5px; line-height: 1.5; opacity: .9; margin-bottom: 14px; }
.pemail { display: flex; gap: 10px; flex-wrap: wrap; }
.pemail .tinput { flex: 1; min-width: 180px; }
.pbtns { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }

.loader { display: flex; align-items: center; gap: 12px; padding: 8px 2px; font-weight: 700; opacity: .9; }
.spin { width: 22px; height: 22px; border-radius: 50%; border: 3px solid rgba(255,255,255,.2); border-top-color: var(--accent); animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.toast { position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%); z-index: 30; background: rgba(20,18,28,.85); border: 1px solid rgba(255,255,255,.18); -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px); color: #fff; padding: 12px 20px; border-radius: 999px; font-weight: 700; font-size: 14px; box-shadow: 0 14px 40px -8px rgba(0,0,0,.6); animation: toast 2.4s ease forwards; }
@keyframes toast { 0%{opacity:0;transform:translate(-50%,14px)} 12%,80%{opacity:1;transform:translate(-50%,0)} 100%{opacity:0;transform:translate(-50%,-8px)} }

.petal { position: fixed; bottom: -6vh; z-index: 40; pointer-events: none; font-size: 22px; animation: rise-up linear forwards; }
@keyframes rise-up { 0%{transform:translateY(0) rotate(0); opacity:0} 12%{opacity:1} 100%{transform:translateY(-118vh) rotate(360deg); opacity:0} }

button:focus-visible, textarea:focus-visible, input:focus-visible, .box:focus-visible, .daychip:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

@media (min-width: 600px) {
  .fields { grid-template-columns: 1fr 1fr; }
  .row2 { grid-template-columns: 0.85fr 1.15fr; }
}
@media (prefers-reduced-motion: reduce) {
  .blob1, .blob2 { animation: none; }
  .petal { display: none; }
  .card, .task { animation: none; }
}
`;

function Check() {
  return (<svg viewBox="0 0 24 24" fill="none" stroke="#15120c" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round"><path d="M5 13l4 4L19 7" /></svg>);
}

function Plant({ p }) {
  const bloom = p >= 0.85;
  const stemScale = 0.24 + p * 0.76;
  const leaf = (show, extra) => ({ transformOrigin: "50px 70px", transform: `scale(${show ? 1 : 0})`, opacity: show ? 1 : 0, transition: "transform .7s cubic-bezier(.34,1.56,.5,1), opacity .5s", ...extra });
  return (
    <svg width="86" height="106" viewBox="0 0 100 116" aria-hidden="true">
      <ellipse cx="50" cy="108" rx="30" ry="6" fill="rgba(0,0,0,.25)" />
      <g style={{ transformOrigin: "50px 92px", transform: `scaleY(${stemScale})`, transition: "transform .7s cubic-bezier(.34,1.4,.5,1)" }}><rect x="47" y="30" width="6" height="62" rx="3" fill="url(#stem)" /></g>
      <g style={leaf(p > 0.22)}><path d="M48 72 C30 70 24 58 22 50 C36 50 46 58 48 72 Z" fill="url(#leaf)" /></g>
      <g style={leaf(p > 0.48, { transformOrigin: "50px 58px" })}><path d="M52 60 C70 58 76 46 78 38 C64 38 54 46 52 60 Z" fill="url(#leaf)" /></g>
      {!bloom ? (
        <g style={{ transformOrigin: "50px 34px", transform: `scale(${0.5 + p * 0.7})`, transition: "transform .7s cubic-bezier(.34,1.5,.5,1)" }}>
          <path d="M50 38 C42 34 40 26 41 20 C49 22 52 30 50 38 Z" fill="url(#leaf)" /><path d="M50 38 C58 34 60 26 59 20 C51 22 48 30 50 38 Z" fill="url(#leaf)" />
        </g>
      ) : (
        <g style={{ transformOrigin: "50px 26px", animation: "rise .6s cubic-bezier(.34,1.56,.5,1) both" }}>
          {[0, 72, 144, 216, 288].map((a) => (<ellipse key={a} cx="50" cy="16" rx="6.5" ry="11" fill="url(#petalg)" transform={`rotate(${a} 50 26)`} />))}
          <circle cx="50" cy="26" r="6" fill="#FFD24A" />
        </g>
      )}
      <path d="M34 92 L66 92 L62 112 L38 112 Z" fill="url(#pot)" />
      <ellipse cx="50" cy="92" rx="16" ry="4.5" fill="#0d1b13" /><rect x="32" y="88" width="36" height="7" rx="3.5" fill="#C97B4A" />
      <defs>
        <linearGradient id="stem" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stopColor="#7BC47F" /><stop offset="1" stopColor="#2E7D55" /></linearGradient>
        <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stopColor="#8FE06A" /><stop offset="1" stopColor="#3E9C5F" /></linearGradient>
        <linearGradient id="pot" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stopColor="#D88950" /><stop offset="1" stopColor="#A85E32" /></linearGradient>
        <radialGradient id="petalg"><stop offset="0" stopColor="#FFC2D6" /><stop offset="1" stopColor="#FF7FA8" /></radialGradient>
      </defs>
    </svg>
  );
}

async function copyText(t) {
  try { await navigator.clipboard.writeText(t); return true; }
  catch (e) {
    try { const ta = document.createElement("textarea"); ta.value = t; ta.style.position = "fixed"; ta.style.opacity = "0"; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); return true; }
    catch (_) { return false; }
  }
}

function App() {
  const [lang, setLang] = useState("fr");
  const [view, setView] = useState("feelings");
  const [ready, setReady] = useState(false);

  const [mood, setMood] = useState(null);
  const [cause, setCause] = useState("");
  const [wish, setWish] = useState("");
  const [history, setHistory] = useState([]);
  const [savedFlash, setSavedFlash] = useState(false);

  const [tasksAll, setTasksAll] = useState({});
  const [selKey, setSelKey] = useState(ymd(new Date()));
  const [draft, setDraft] = useState("");

  const [period, setPeriod] = useState("week");
  const [advice, setAdvice] = useState(null);
  const [loadingAdvice, setLoadingAdvice] = useState(false);
  const [parentEmail, setParentEmail] = useState("");

  const [toast, setToast] = useState("");
  const [petals, setPetals] = useState([]);
  const inputRef = useRef(null);
  const todayRef = useRef(null);
  const celebrated = useRef(new Set());

  const L = lang;
  const tr = T[L];
  const jours = L === "fr" ? JOURS_FR : JOURS_EN;
  const abbr  = L === "fr" ? ABBR_FR : ABBR_EN;
  const mois  = L === "fr" ? MOIS_FR : MOIS_EN;
  const ml = (m) => (m ? (L === "fr" ? m.fr : m.en) : "");

  const now = new Date();
  const todayKey = ymd(now);
  const fmtDate = (d) => L === "fr" ? `${jours[d.getDay()]} ${d.getDate()} ${mois[d.getMonth()]}` : `${jours[d.getDay()]}, ${mois[d.getMonth()]} ${d.getDate()}`;
  const headerDate = fmtDate(now);

  useEffect(() => {
    try {
      const sl = store.get("lang");
      if (sl === "fr" || sl === "en") setLang(sl);
      else if (navigator.language && navigator.language.toLowerCase().startsWith("en")) setLang("en");
      const h = store.get("mood-history");
      if (h) { const arr = JSON.parse(h); setHistory(arr); const t = arr.find((e) => e.date === todayKey); if (t) { setMood(t.mood); setCause(t.cause || ""); setWish(t.wish || ""); } }
      const ta = store.get("tasks-all"); if (ta) setTasksAll(JSON.parse(ta));
      const pe = store.get("parent-email"); if (pe) setParentEmail(pe);
    } catch (e) {}
    setReady(true);
  }, []);

  useEffect(() => { if (ready && view === "tasks" && todayRef.current) todayRef.current.scrollIntoView({ inline: "center", block: "nearest" }); }, [ready, view]);

  const changeLang = (v) => { setLang(v); store.set("lang", v); };

  const moodObj = mood ? MOOD(mood) : null;
  const palette = view === "tasks" ? GREEN : view === "recap" ? CALM : (moodObj || NEUTRAL);

  const isWk = period === "week";
  const periodEntries = (() => {
    if (isWk) { const mon = startOfWeek(now); return history.filter((e) => { const d = parseYmd(e.date); return d >= mon && d <= addDays(mon, 6); }); }
    return history.filter((e) => { const d = parseYmd(e.date); return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth(); });
  })();
  const dominant = (() => {
    const tally = {}; periodEntries.forEach((e) => { tally[e.mood] = (tally[e.mood] || 0) + 1; });
    let best = null, n = 0; Object.keys(tally).forEach((k) => { if (tally[k] > n) { n = tally[k]; best = k; } });
    return best ? MOOD(best) : null;
  })();
  const activePalette = view === "recap" && dominant ? dominant : palette;
  const rootStyle = { "--base": activePalette.base, "--g1": activePalette.g1, "--g2": activePalette.g2, "--accent": activePalette.accent, "--txt": "#FDFBF6" };

  const showToast = (m) => { setToast(m); setTimeout(() => setToast(""), 2300); };
  const reduced = () => window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const celebrate = () => {
    if (reduced()) return;
    const k = ["🌸", "✨", "🍃", "🌼"];
    setPetals(Array.from({ length: 16 }, (_, i) => ({ id: Date.now() + i, e: k[i % k.length], left: Math.random() * 96 + "%", dur: 2.4 + Math.random() * 1.6, delay: Math.random() * 0.5, size: 16 + Math.random() * 16 })));
    setTimeout(() => setPetals([]), 4200);
  };

  const saveMood = () => {
    const entry = { date: todayKey, mood, cause, wish, at: Date.now() };
    const next = [entry, ...history.filter((e) => e.date !== todayKey)];
    setHistory(next); store.set("mood-history", JSON.stringify(next));
    setSavedFlash(true); setTimeout(() => setSavedFlash(false), 1800);
    showToast(tr.toastSaved); celebrate();
  };

  const selTasks = tasksAll[selKey] || [];
  const persistTasks = (next) => { const all = { ...tasksAll, [selKey]: next }; if (next.length === 0) delete all[selKey]; setTasksAll(all); store.set("tasks-all", JSON.stringify(all)); };
  const addTask = () => { const txt = draft.trim(); if (!txt) return; persistTasks([...selTasks, { id: Date.now(), text: txt, done: false }]); setDraft(""); if (inputRef.current) inputRef.current.focus(); };
  const toggle = (id) => {
    const next = selTasks.map((t) => (t.id === id ? { ...t, done: !t.done } : t)); persistTasks(next);
    const done = next.filter((t) => t.done).length;
    if (next.length > 0 && done === next.length && !celebrated.current.has(selKey)) { celebrated.current.add(selKey); celebrate(); showToast(tr.toastComplete); }
  };
  const remove = (id) => persistTasks(selTasks.filter((t) => t.id !== id));

  const selDate = parseYmd(selKey);
  const selProgress = selTasks.length ? selTasks.filter((t) => t.done).length / selTasks.length : 0;
  const strip = Array.from({ length: 38 }, (_, i) => addDays(now, i - 2));
  const recents = history.slice(0, 6).map((e) => ({ ...e, m: MOOD(e.mood) })).filter((e) => e.m);
  const saveParentEmail = (v) => { setParentEmail(v); store.set("parent-email", v); };

  const periodLabel = L === "fr" ? (isWk ? "semaine" : "mois") : (isWk ? "week" : "month");
  const periodPoss  = L === "fr" ? (isWk ? "ta semaine" : "ton mois") : (isWk ? "your week" : "your month");
  const periodOf    = L === "fr" ? (isWk ? "de la semaine" : "du mois") : (isWk ? "this week" : "this month");
  const periodAhead = L === "fr" ? (isWk ? "Pour la semaine à venir" : "Pour le mois à venir") : (isWk ? "For the week ahead" : "For the month ahead");

  const weekDays = (() => { const mon = startOfWeek(now); return Array.from({ length: 7 }, (_, i) => { const d = addDays(mon, i); const e = history.find((x) => x.date === ymd(d)); return { key: ymd(d), weekday: abbr[d.getDay()], mood: e ? MOOD(e.mood) : null, isToday: sameDay(d, now) }; }); })();
  const monthCells = (() => {
    const first = new Date(now.getFullYear(), now.getMonth(), 1);
    const lead = (first.getDay() + 6) % 7;
    const dim = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
    const cells = [];
    for (let i = 0; i < lead; i++) cells.push({ blank: true, key: "b" + i });
    for (let d = 1; d <= dim; d++) { const date = new Date(now.getFullYear(), now.getMonth(), d); const e = history.find((x) => x.date === ymd(date)); cells.push({ key: ymd(date), day: d, mood: e ? MOOD(e.mood) : null, isToday: sameDay(date, now) }); }
    return cells;
  })();
  const avgVal = periodEntries.length ? periodEntries.reduce((s, e) => s + (MOOD(e.mood) ? MOOD(e.mood).val : 0), 0) / periodEntries.length : 0;
  const taskRange = (() => {
    let total = 0, done = 0, fullDays = 0, daysWithTasks = 0;
    const keys = isWk ? weekDays.map((d) => d.key) : monthCells.filter((c) => !c.blank).map((c) => c.key);
    keys.forEach((k) => { const arr = tasksAll[k] || []; if (arr.length) { daysWithTasks++; total += arr.length; const dn = arr.filter((t) => t.done).length; done += dn; if (dn === arr.length) fullDays++; } });
    return { total, done, fullDays, daysWithTasks, rate: total ? Math.round((done / total) * 100) : 0 };
  })();

  const verdictText = () => {
    const v = avgVal;
    if (L === "fr") return v >= 1.5 ? "Tout en lumière ☀️" : v >= 0.5 ? "De belles couleurs 🌈" : v > -0.5 ? "En bel équilibre 🌤️" : v > -1.5 ? "Quelques nuages 🌧️" : "Une vraie traversée 🌧️";
    return v >= 1.5 ? "All sunshine ☀️" : v >= 0.5 ? "Lovely colors 🌈" : v > -0.5 ? "Nicely balanced 🌤️" : v > -1.5 ? "A few clouds 🌧️" : "A tough stretch 🌧️";
  };
  const avgWord = L === "fr"
    ? (avgVal >= 1.5 ? "très positive" : avgVal >= 0.5 ? "plutôt positive" : avgVal > -0.5 ? "en équilibre" : avgVal > -1.5 ? "plutôt difficile" : "difficile")
    : (avgVal >= 1.5 ? "very positive" : avgVal >= 0.5 ? "fairly positive" : avgVal > -0.5 ? "balanced" : avgVal > -1.5 ? "fairly tough" : "tough");

  function localAdvice() {
    const dom = dominant ? (L === "fr" ? dominant.fr.toLowerCase() : dominant.en.toLowerCase()) : (L === "fr" ? "variée" : "varied");
    const n = periodEntries.length;
    if (L === "fr") {
      const recap = n
        ? `Cette ${periodLabel}, tu t'es senti·e surtout ${dom}. Tu as noté ${n} humeur${n > 1 ? "s" : ""} et accompli ${taskRange.done} tâche${taskRange.done > 1 ? "s" : ""} sur ${taskRange.total || 0}. Continue, tu avances vraiment bien !`
        : `Tu n'as pas encore noté d'humeur ${periodOf}. Commence dès aujourd'hui, et ton bilan se remplira de couleurs.`;
      const tips = [
        "Note ton humeur chaque soir : en quelques jours, tu verras tes couleurs se dessiner.",
        taskRange.total ? "Le dimanche, prépare ta liste de la semaine pour partir serein·e." : "Ajoute 2 ou 3 petites tâches par jour, faciles à cocher pour te motiver.",
        "Quand une journée est difficile, écris ce qui t'a marqué·e : ça aide à y voir plus clair.",
      ];
      const parent = n
        ? `${isWk ? "Cette semaine" : "Ce mois-ci"}, l'humeur générale a été ${avgWord}, surtout « ${dom} ». ${taskRange.total ? `${taskRange.fullDays} journée(s) ont été complétées entièrement.` : ""} Vous pouvez encourager les moments positifs et ouvrir le dialogue sur les journées plus délicates.`
        : `Pas encore de données ${periodOf}. Encouragez votre enfant à noter ses humeurs et ses tâches quelques jours, le bilan deviendra parlant.`;
      return { recap, tips, parent };
    }
    const recap = n
      ? `This ${periodLabel}, you felt mostly ${dom}. You logged ${n} mood${n > 1 ? "s" : ""} and completed ${taskRange.done} of ${taskRange.total || 0} task${taskRange.total > 1 ? "s" : ""}. Keep going — you're doing great!`
      : `You haven't logged any mood ${periodOf} yet. Start today, and your recap will fill with color.`;
    const tips = [
      "Log your mood every evening — in a few days you'll see your colors take shape.",
      taskRange.total ? "On Sunday, set up your week's list so you start calm and ready." : "Add 2 or 3 small tasks a day, easy to check off to stay motivated.",
      "When a day is hard, write down what stood out — it helps you see things more clearly.",
    ];
    const parent = n
      ? `${isWk ? "This week" : "This month"}, the overall mood was ${avgWord}, mostly “${dom}”. ${taskRange.total ? `${taskRange.fullDays} day(s) were fully completed.` : ""} You can celebrate the bright moments and gently open up about the harder days.`
      : `No data ${periodOf} yet. Encourage your child to log moods and tasks for a few days, and the recap will become meaningful.`;
    return { recap, tips, parent };
  }

  function generateAdvice() {
    setLoadingAdvice(true); setAdvice(null);
    setTimeout(() => { setAdvice({ verdict: verdictText(), ...localAdvice() }); setLoadingAdvice(false); showToast(tr.toastRecap); }, 650);
  }

  function buildParentText(a) {
    if (L === "fr") {
      const p = isWk ? "la semaine" : "le mois";
      return [
        `Bilan de ${p} — aujourd'hui`, ``,
        `Verdict : ${a.verdict}`,
        `Humeur générale : ${avgWord}${dominant ? ` (surtout ${dominant.fr})` : ""}`,
        `Tâches : ${taskRange.done}/${taskRange.total || 0} accomplies (${taskRange.rate}%), ${taskRange.fullDays} journée(s) à 100%`, ``,
        `Pour l'enfant : ${a.recap}`, ``,
        `Conseils :`, ...a.tips.map((t, i) => `  ${i + 1}. ${t}`), ``,
        `Pour les parents : ${a.parent}`,
      ].join("\n");
    }
    const p = isWk ? "the week" : "the month";
    return [
      `Recap of ${p} — today`, ``,
      `Verdict: ${a.verdict}`,
      `Overall mood: ${avgWord}${dominant ? ` (mostly ${dominant.en})` : ""}`,
      `Tasks: ${taskRange.done}/${taskRange.total || 0} done (${taskRange.rate}%), ${taskRange.fullDays} full day(s)`, ``,
      `For the child: ${a.recap}`, ``,
      `Tips:`, ...a.tips.map((t, i) => `  ${i + 1}. ${t}`), ``,
      `For parents: ${a.parent}`,
    ].join("\n");
  }

  const onCopy = async () => { if (!advice) return; const ok = await copyText(buildParentText(advice)); showToast(ok ? tr.toastCopied : tr.toastNoCopy); };
  const onMail = () => {
    if (!advice) return;
    const subj = encodeURIComponent(L === "fr" ? `Bilan de ${isWk ? "la semaine" : "ce mois"} — aujourd'hui` : `Recap of ${isWk ? "this week" : "this month"} — today`);
    const body = encodeURIComponent(buildParentText(advice));
    try { window.open(`mailto:${parentEmail.trim()}?subject=${subj}&body=${body}`, "_blank"); } catch (e) { showToast(tr.toastMail); }
  };

  const heading = view === "feelings"
    ? (moodObj ? (L === "fr" ? `Aujourd'hui, tu te sens ${moodObj.fr.toLowerCase()}.` : `Today, you feel ${moodObj.en.toLowerCase()}.`) : tr.howFeel)
    : "";
  const viewIdx = view === "feelings" ? 0 : view === "tasks" ? 1 : 2;
  const heatHead = L === "fr" ? ["L","M","M","J","V","S","D"] : ["M","T","W","T","F","S","S"];
  const taskWord = (n) => L === "fr" ? (n > 1 ? "tâches" : "tâche") : (n > 1 ? "tasks" : "task");

  return (
    <div className="app" style={rootStyle}>
      <style>{css}</style>
      <div className="ambient" /><div className="blob blob1" /><div className="blob blob2" /><div className="grain" />
      <div className="wrap">
        <div className="top">
          <div className="brand">{tr.brand}</div>
          <div className="topright">
            <div className="lang" role="group" aria-label="Langue / Language">
              <div className="lpill" style={{ transform: `translateX(${lang === "en" ? 100 : 0}%)` }} />
              <button className={lang === "fr" ? "act" : ""} onClick={() => changeLang("fr")}>FR</button>
              <button className={lang === "en" ? "act" : ""} onClick={() => changeLang("en")}>EN</button>
            </div>
            <div className="date">{headerDate}</div>
          </div>
        </div>

        <div className="seg" role="tablist" aria-label="Vue">
          <div className="pill" style={{ transform: `translateX(${viewIdx * 100}%)` }} />
          <button className={view === "feelings" ? "act" : ""} onClick={() => setView("feelings")} role="tab" aria-selected={view === "feelings"}>{tr.tabFeel}</button>
          <button className={view === "tasks" ? "act" : ""} onClick={() => setView("tasks")} role="tab" aria-selected={view === "tasks"}>{tr.tabTask}</button>
          <button className={view === "recap" ? "act" : ""} onClick={() => setView("recap")} role="tab" aria-selected={view === "recap"}>{tr.tabRecap}</button>
        </div>

        {view === "feelings" && (
          <div className="card">
            <div className="eyebrow">{tr.journalEyebrow}</div>
            <h1 className="h-emotion">{heading}</h1>
            <p className="sub">{tr.feelSub}</p>
            <div className="moods">
              {MOODS.map((m) => (
                <button key={m.key} className={"mood" + (mood === m.key ? " on" : "")} aria-pressed={mood === m.key} aria-label={ml(m)} onClick={() => setMood(m.key)}>
                  <span className="disc" style={{ backgroundImage: `linear-gradient(135deg, ${m.g1}, ${m.g2})` }}>{m.emoji}</span>
                  <span className="mlabel">{ml(m)}</span>
                </button>
              ))}
            </div>
            <div className="fields">
              <div className="field">
                <label htmlFor="cause">{tr.fldStood}</label>
                <textarea id="cause" placeholder={tr.fldStoodPh} value={cause} onChange={(e) => setCause(e.target.value)} />
              </div>
              <div className="field">
                <label htmlFor="wish">{tr.fldWish}</label>
                <textarea id="wish" placeholder={tr.fldWishPh} value={wish} onChange={(e) => setWish(e.target.value)} />
              </div>
            </div>
            <button className="cta" disabled={!mood} onClick={saveMood}>{savedFlash ? tr.saved : tr.saveDay}</button>
            {!mood && <p className="hint">{tr.pickMood}</p>}
            {recents.length > 0 && (
              <div className="recents">
                <div className="lbl">{tr.recentDays}</div>
                <div className="chips">
                  {recents.map((e, i) => { const d = parseYmd(e.date); return (
                    <div className="chip" key={i}>
                      <span className="cd" style={{ backgroundImage: `linear-gradient(135deg, ${e.m.g1}, ${e.m.g2})` }}>{e.m.emoji}</span>
                      <span>{ml(e.m)}</span><span className="cdate">{d.getDate()}/{d.getMonth() + 1}</span>
                    </div>); })}
                </div>
              </div>
            )}
          </div>
        )}

        {view === "tasks" && (
          <React.Fragment>
            <div className="card">
              <div className="eyebrow" style={{ marginBottom: 12 }}>{tr.planEyebrow}</div>
              <div className="daystrip">
                {strip.map((d) => { const k = ymd(d); const arr = tasksAll[k] || []; const isToday = sameDay(d, now);
                  return (
                    <button key={k} ref={isToday ? todayRef : null} className={"daychip" + (k === selKey ? " sel" : "") + (isToday ? " today" : "")} onClick={() => setSelKey(k)}>
                      <span className="dw">{abbr[d.getDay()]}</span><span className="dd">{d.getDate()}</span>
                      <span className={"dot" + (arr.length ? " show" : "")} />
                    </button>
                  ); })}
              </div>
              <div className="planrow">
                <div className="seld">{sameDay(selDate, now) ? tr.today : fmtDate(selDate)}</div>
                <div className="small">
                  {selKey !== todayKey && <button className="ghost" style={{ padding: "8px 12px", fontSize: 13 }} onClick={() => setSelKey(todayKey)}>{tr.today}</button>}
                  <input type="date" className="djump" value={selKey} min={ymd(addDays(now, -7))} onChange={(e) => e.target.value && setSelKey(e.target.value)} />
                </div>
              </div>
            </div>

            <div className="row2">
              <div className="card daycard">
                <div className="dname">{jours[selDate.getDay()]}</div>
                <div className="dnum">{selDate.getDate()}</div>
                <div className="dmon">{mois[selDate.getMonth()]}</div>
              </div>
              <div className="card">
                <div className="eyebrow" style={{ marginBottom: 14 }}>{tr.progressDay}</div>
                <div className="progwrap">
                  <Plant p={selProgress} />
                  <div className="progmeta">
                    <div className="progpct">{Math.round(selProgress * 100)}%</div>
                    <div className="progsub">{selTasks.filter((t) => t.done).length} / {selTasks.length || 0} {taskWord(selTasks.length)}</div>
                    <div className="bar"><i style={{ width: `${selProgress * 100}%` }} /></div>
                    {selTasks.length > 0 && selProgress === 1 && <div className="donenote">{tr.allDone}</div>}
                  </div>
                </div>
              </div>
            </div>

            <div className="card">
              <div className="addrow">
                <input ref={inputRef} className="tinput" placeholder={sameDay(selDate, now) ? tr.taskPhToday : tr.taskPhPlan} value={draft}
                  onChange={(e) => setDraft(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") addTask(); }} aria-label="task" />
                <button className="addbtn" onClick={addTask} aria-label="add">+</button>
              </div>
              {selTasks.length === 0 ? (
                <div className="empty">{tr.emptyTasks1}<br />{tr.emptyTasks2}</div>
              ) : (
                <div className="tasks">
                  {selTasks.map((t) => (
                    <div className={"task" + (t.done ? " done" : "")} key={t.id}>
                      <button className={"box" + (t.done ? " on" : "")} onClick={() => toggle(t.id)} aria-pressed={t.done} aria-label="toggle"><Check /></button>
                      <span className="txt">{t.text}</span>
                      <button className="del" onClick={() => remove(t.id)} aria-label="delete">✕</button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </React.Fragment>
        )}

        {view === "recap" && (
          <React.Fragment>
            <div className="ptoggle">
              <div className={"pp" + (period === "month" ? " r" : "")} />
              <button className={period === "week" ? "act" : ""} onClick={() => { setPeriod("week"); setAdvice(null); }}>{tr.week}</button>
              <button className={period === "month" ? "act" : ""} onClick={() => { setPeriod("month"); setAdvice(null); }}>{tr.month}</button>
            </div>

            <div className="card">
              <div className="eyebrow">{isWk ? tr.weekColors : tr.monthColors}</div>
              <div className="verdict">{advice ? advice.verdict : verdictText()}</div>
              {isWk ? (
                <div className="weekbars">
                  {weekDays.map((d) => { const v = d.mood ? d.mood.val : 0; const h = d.mood ? ((v + 2) / 5) * 76 + 24 : 12;
                    return (
                      <div className="wbcol" key={d.key}>
                        <div className="wbemoji">{d.mood ? d.mood.emoji : "·"}</div>
                        <div className="wbbar" style={d.mood ? { height: h + "%", backgroundImage: `linear-gradient(180deg, ${d.mood.g1}, ${d.mood.g2})` } : { height: h + "%", background: "rgba(255,255,255,.08)" }} />
                        <div className="wblbl">{d.weekday}</div>
                      </div>
                    ); })}
                </div>
              ) : (
                <React.Fragment>
                  <div className="heathead">{heatHead.map((x, i) => <span key={i}>{x}</span>)}</div>
                  <div className="heat">
                    {monthCells.map((c) => c.blank
                      ? <div className="hc blank" key={c.key} />
                      : <div key={c.key} className={"hc " + (c.mood ? "" : "none") + (c.isToday ? " today" : "")} style={c.mood ? { backgroundImage: `linear-gradient(135deg, ${c.mood.g1}, ${c.mood.g2})`, color: "#15120c" } : {}}>{c.day}</div>)}
                  </div>
                </React.Fragment>
              )}
              <div className="statline">
                <div className="stat"><div className="k">{tr.topMood}</div><div className="v">{dominant ? <React.Fragment>{dominant.emoji} {ml(dominant)}</React.Fragment> : "—"}</div></div>
                <div className="stat"><div className="k">{tr.daysLogged}</div><div className="v">{periodEntries.length}</div></div>
                <div className="stat"><div className="k">{tr.goalsReached}</div><div className="v">{taskRange.rate}% <span style={{ fontSize: 13, opacity: .6, fontWeight: 700 }}>({taskRange.done}/{taskRange.total || 0})</span></div></div>
              </div>
            </div>

            <div className="card">
              <div className="seclbl">{tr.recapTips}</div>
              {loadingAdvice ? (
                <div className="loader"><div className="spin" /> {L === "fr" ? `Je prépare ${periodPoss}…` : `Preparing ${periodPoss}…`}</div>
              ) : advice ? (
                <React.Fragment>
                  <p className="recaptext">{advice.recap}</p>
                  <div className="seclbl" style={{ marginTop: 18 }}>{periodAhead}</div>
                  <div className="tips">
                    {advice.tips.map((t, i) => (<div className="tip" key={i}><span className="ti">{["🌱","☀️","💫"][i] || "✨"}</span><span className="tt">{t}</span></div>))}
                  </div>
                  <button className="ghost" style={{ marginTop: 16 }} onClick={generateAdvice}>{tr.regen}</button>
                </React.Fragment>
              ) : (
                <React.Fragment>
                  <p className="sub" style={{ marginBottom: 16 }}>{L === "fr" ? `Ton bilan se prépare à partir de tes humeurs et de tes tâches ${periodOf}.` : `Your recap is built from your moods and tasks ${periodOf}.`}</p>
                  <button className="cta" style={{ marginTop: 0 }} onClick={generateAdvice}>{tr.genRecap}</button>
                </React.Fragment>
              )}
            </div>

            {advice && (
              <div className="card">
                <div className="seclbl">{tr.shareParents}</div>
                <div className="parentbox">
                  <p className="parentnote">{advice.parent}</p>
                  <div className="pemail">
                    <input className="tinput" type="email" placeholder={tr.parentPh} value={parentEmail} onChange={(e) => saveParentEmail(e.target.value)} aria-label="parent email" />
                  </div>
                  <div className="pbtns">
                    <button className="ghost" onClick={onCopy}>{tr.copyRecap}</button>
                    <button className="cta" style={{ width: "auto", marginTop: 0, padding: "12px 20px", fontSize: 14 }} onClick={onMail}>{tr.sendParents}</button>
                  </div>
                </div>
              </div>
            )}
          </React.Fragment>
        )}
      </div>

      {toast && <div className="toast">{toast}</div>}
      {petals.map((p) => (<span key={p.id} className="petal" style={{ left: p.left, fontSize: p.size, animationDuration: `${p.dur}s`, animationDelay: `${p.delay}s` }}>{p.e}</span>))}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
